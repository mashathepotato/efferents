lab_id: smoke-coefficient
domain: synthetic

source:
  dir: ./src/
  allowed_patterns:
    - "**/*.py"
    - "**/*.yaml"

executor:
  # Executed with cwd = source.dir (./src), so the module is `stub_run`,
  # not `src.stub_run`. config_path is passed absolute, so cwd doesn't affect it.
  run_command: "python3 -m stub_run --config {config_path}"
  smoke_command: "python3 -m stub_run --config {config_path} --smoke"
  config_template: ../configs/default.yaml
  run_timeout_s: 60
  smoke_timeout_s: 30

metrics:
  headline:
    column: synthetic_loss
    direction: min
  panels:
    - { column: synthetic_loss, label: "Loss" }
  flat_digest_epsilon: 0.005

budget:
  daily_cap_usd: 2.0
  sonnet_default: true
